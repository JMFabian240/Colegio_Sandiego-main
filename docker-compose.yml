# ============================================================
# SAE Colegio San Diego — Docker Compose v3
# Sistema Offline-First: corre completamente en LAN local.
# Motor: PostgreSQL 16 (producción real) + Backend Node.js
# ============================================================

services:

  # ── Base de datos PostgreSQL 16 ─────────────────────────────
  postgres_sae:
    image: postgres:16-alpine
    container_name: sae_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: sae_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SaeColegio2026}
      POSTGRES_DB: sae_colegio_san_diego
      LANG: es_MX.utf8
      # C.UTF-8: compatible con Alpine (musl libc) + soporta ñ/tildes en ILIKE.
      # IMPORTANTE: Solo surte efecto en un volumen nuevo (docker compose down -v).
      # Para ICU completo en pg16-alpine usar: --locale-provider=icu --icu-locale=es-MX
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C.UTF-8 --lc-ctype=C.UTF-8"

    ports:
      - "5433:5432"

    volumes:
      # Persistencia de datos (sobrevive a docker compose down)
      - postgres_data:/var/lib/postgresql/data
      # Scripts SQL que corren SOLO la primera vez que se crea la BD
      - ./BD-ColegioSandiego/init-db:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sae_admin -d sae_colegio_san_diego"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    networks:
      - sae-network

    deploy:
      resources:
        limits:
          memory: 512M

  # ── Backend Node.js / Express ────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sae-backend
    restart: unless-stopped

    depends_on:
      postgres_sae:
        condition: service_healthy

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      # PostgreSQL connection string
      DATABASE_URL: "postgresql://sae_admin:${POSTGRES_PASSWORD:-SaeColegio2026}@postgres_sae:5432/sae_colegio_san_diego"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      BACKUP_DIR: /app/backups

    volumes:
      # Backups persistentes fuera del contenedor
      - sae_backups:/app/backups

    networks:
      - sae-network

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ── Redes ────────────────────────────────────────────────────
networks:
  sae-network:
    driver: bridge

# ── Volúmenes persistentes ───────────────────────────────────
volumes:
  postgres_data:
    driver: local
  sae_backups:
    driver: local
