<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAE · Colegio San Diego | Iniciar sesión</title>

<!-- Config dinámica del servidor (IP LAN) -->
<script src="/config.js"></script>
<!-- API client -->
<script src="/shared/api.js"></script>

<script src="/vendor/tailwind.cdn.js"></script>
<script defer src="/vendor/alpine.min.js"></script>
<link href="/vendor/fonts.css" rel="stylesheet" />

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy:    { DEFAULT: '#003366', 50: '#eef2f8', 700: '#001f3d' },
          crimson: { DEFAULT: '#CC0000' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
      }
    }
  }
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #003366 0%, #001F40 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card-login { background: white; border-radius: 1.5rem; width: 400px; max-width: 94vw; padding: 2.5rem; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .input-modern { width: 100%; padding: 0.65rem 0.9rem; border-radius: 0.75rem; border: 1px solid #E2E8F0; background: white; font-size: 0.875rem; outline: none; transition: all 0.15s; }
  .input-modern:focus { border-color: #003366; box-shadow: 0 0 0 3px rgba(0,51,102,0.08); }
  .btn-primary { width: 100%; background: #003366; color: white; padding: 0.75rem 1rem; border-radius: 0.75rem; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.15s; border: none; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
  .btn-primary:hover:not(:disabled) { background: #001F40; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,51,102,0.25); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .error-msg { background: #FEF2F2; border: 1px solid #FECACA; color: #CC0000; border-radius: 0.75rem; padding: 0.65rem 1rem; font-size: 0.8125rem; font-weight: 500; }
  [x-cloak] { display: none; }
</style>
</head>
<body>

<div x-data="loginApp()" x-init="init()">
  <div class="card-login">

    <!-- Logo / Cabecera -->
    <div class="text-center mb-8">
      <div class="w-20 h-20 flex items-center justify-center mx-auto mb-4">
        <img src="/shared/escudo.png" alt="Escudo Colegio San Diego" class="w-full h-full object-contain drop-shadow-md" />
      </div>
      <h1 class="text-xl font-bold text-gray-800">Colegio San Diego</h1>
      <p class="text-sm text-gray-400 mt-1">Sistema Administrativo Escolar</p>
    </div>

    <!-- Mensaje de error -->
    <div class="error-msg mb-4" x-show="error" x-cloak x-text="error"></div>

    <!-- Formulario -->
    <form @submit.prevent="handleLogin()" class="space-y-4">

      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1">Usuario</label>
        <input
          type="text"
          class="input-modern"
          placeholder="tu.usuario"
          x-model="form.username"
          :disabled="cargando"
          autocomplete="username"
          required
        />
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1">Contraseña</label>
        <input
          type="password"
          class="input-modern"
          placeholder="••••••••"
          x-model="form.password"
          :disabled="cargando"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn-primary mt-2" :disabled="cargando">
        <span x-show="!cargando">Iniciar sesión</span>
        <span x-show="cargando" x-cloak>Verificando...</span>
      </button>

    </form>

    <!-- Pie -->
    <p class="text-center text-xs text-gray-400 mt-6">
      SAE v2.0.0 · Red local interna · Sin conexión a internet requerida
    </p>
  </div>
</div>

<script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('loginApp', () => ({
      form:     { username: '', password: '' },
      error:    '',
      cargando: false,

      init() {
        // Si ya hay sesión válida, redirigir directo al panel correspondiente
        var token   = localStorage.getItem('sae_token');
        var usuario = null;
        try { usuario = JSON.parse(localStorage.getItem('sae_usuario')); } catch (e) {}

        if (token && usuario) {
          try {
            var partes  = token.split('.');
            var payload = JSON.parse(atob(partes[1]));
            if (!payload.exp || Math.floor(Date.now() / 1000) < payload.exp) {
              // Token aún válido → redirigir
              this._redirigirPorRol(usuario.rol);
              return;
            }
          } catch (e) {}
          // Token inválido → limpiar y mostrar login
          localStorage.removeItem('sae_token');
          localStorage.removeItem('sae_usuario');
        }
      },

      async handleLogin() {
        this.error    = '';
        this.cargando = true;

        try {
          var res = await window.saeApi.auth.login({
            username: this.form.username.trim(),
            password: this.form.password,
          });

          if (res.ok && res.data && res.data.token) {
            // Guardar sesión
            window.saeApi.setToken(res.data.token);
            window.saeApi.setUsuario(res.data.usuario);

            // Redirigir al panel correspondiente según rol
            this._redirigirPorRol(res.data.usuario.rol);
          } else {
            this.error = res.message || 'Credenciales incorrectas. Intenta de nuevo.';
          }
        } catch (e) {
          this.error = 'Error de conexión. Verifica que el servidor esté activo.';
        } finally {
          this.cargando = false;
        }
      },

      _redirigirPorRol(rol) {
        // Todos los roles van al panel unificado
        window.location.replace('/panel.html');
      },
    }));
  });
</script>

</body>
</html>
