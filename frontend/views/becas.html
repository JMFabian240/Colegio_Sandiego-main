<div class="w-full h-full" x-data>
<div>
            <div class="flex justify-between items-center mb-5">
              <h2 class="text-xl font-bold text-navy-800">Gestión de Becas</h2>
              <div class="flex gap-2">
                <button x-show="tienePermiso('becas', 'escritura')" class="btn-outline flex items-center gap-2"
                  @click="openModalNuevoTipoBeca()"><i data-lucide="plus" class="w-4 h-4"></i> Registrar nuevo tipo de
                  beca</button>
                <button class="btn-success" @click="abrirModalBeca()"><i data-lucide="award" class="mr-2"></i> Asignar
                  nueva beca</button>
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-5" x-show="catalogoBecas.length > 0">
              <template x-for="beca in catalogoBecas" :key="beca.becaId">
                <div class="card-clean p-5 text-center">
                  <div class="w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3"
                    :class="{'bg-emerald-50': beca.criterio==='hermanos', 'bg-amber-50': beca.criterio==='calificacion', 'bg-navy-50': beca.criterio!=='hermanos'&&beca.criterio!=='calificacion'}">
                    <i data-lucide="star" class="w-6 h-6"
                      :class="{'text-emerald-600': beca.criterio==='hermanos', 'text-amber-600': beca.criterio==='calificacion', 'text-navy-600': beca.criterio!=='hermanos'&&beca.criterio!=='calificacion'}"></i>
                  </div>
                  <div class="font-bold text-gray-800" x-text="beca.nombreBeca"></div>
                  <div class="text-3xl font-bold mt-1"
                    :class="{'text-emerald-600': beca.criterio==='hermanos', 'text-amber-600': beca.criterio==='calificacion', 'text-navy-600': beca.criterio!=='hermanos'&&beca.criterio!=='calificacion'}"
                    x-text="beca.porcentaje + '%'"></div>
                  <div class="text-xs text-gray-500 mt-1" x-text="beca.descripcion || beca.criterio"></div>
                  <div class="mt-4 pt-3 border-t border-gray-100" x-show="tienePermiso('becas', 'escritura')">
                    <button class="text-xs text-blue-600 hover:text-blue-800 font-medium"
                      @click="editarTipoBeca(beca)">Editar</button>
                  </div>
                </div>
              </template>
            </div>
            <div x-show="catalogoBecas.length === 0"
              class="text-center p-8 bg-white rounded-xl border border-gray-100 mb-5">
              <i data-lucide="award" class="w-8 h-8 mx-auto text-gray-300 mb-2"></i>
              <p class="text-gray-500">No hay becas en el catálogo. Configúralas en la sección de opciones.</p>
            </div>

            <div class="card-clean p-5">
              <h3 class="font-semibold text-gray-700 mb-3">Becas asignadas actualmente</h3>
              <table class="w-full text-sm">
                <thead class="bg-gray-50">
                  <tr>
                    <th class="p-2 text-left">Alumno</th>
                    <th class="p-2 text-left">Beca (Tipo)</th>
                    <th class="p-2 text-left">Estado</th>
                    <th class="p-2 text-right">Descuento</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="asig in becasAsignadas" :key="asig.id">
                    <tr class="border-b border-gray-100 hover:bg-gray-50">
                      <td class="py-3 font-medium" x-text="asig.alumno?.nombre || asig.alumnoId"></td>
                      <td class="py-3" x-text="asig.nombre || asig.tipo"></td>
                      <td class="py-3">
                        <span class="badge-emerald" x-show="asig.activa">Activa</span>
                        <span class="badge-gray" x-show="!asig.activa" x-text="asig.estado"></span>
                      </td>
                      <td class="py-3 text-right font-bold text-navy-700" x-text="asig.porcentaje + '%'"></td>
                    </tr>
                  </template>
                  <tr x-show="becasAsignadas.length === 0">
                    <td colspan="4" class="p-4 text-center text-gray-500">No hay becas asignadas a alumnos en este
                      ciclo.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- AUTORIZACIONES PENDIENTES REMOVIDA A PETICIÓN DEL USUARIO -->
    </div>
</div>
