<div class="w-full h-full" x-data>
<div x-init="buscarAlumnoCalif()">
            <h2 class="text-xl font-bold text-navy-800 mb-3 flex items-center">
              Calificaciones — Buscador inteligente
              <span class="text-sm font-normal text-gray-500 ml-2" x-show="!alumnoSeleccionadoCalif" x-text="`(${alumnosCoincidencias.length} alumnos)`"></span>
            </h2>

            <div class="grid md:grid-cols-4 gap-4 mb-5" x-show="!alumnoSeleccionadoCalif">
              <div>
                <label class="text-xs font-medium text-gray-600">Alumno</label>
                <input type="text" class="input-modern" placeholder="Nombre o matrícula..."
                  x-model="busquedaCalif" @input.debounce.400ms="buscarAlumnoCalif">
              </div>
              <div>
                <label class="text-xs font-medium text-gray-600">Nivel Escolar</label>
                <select class="input-modern" x-model="filtroCalifNivel"
                  @change="$nextTick(() => { filtroCalifGrado=''; filtroCalifGrupo=''; buscarAlumnoCalif(); })">
                  <option value="">Todos los niveles</option>
                  <template x-for="n in nivelesDisponibles" :key="n">
                    <option :value="n" x-text="n"></option>
                  </template>
                </select>
              </div>
              <div>
                <label class="text-xs font-medium text-gray-600">Grado</label>
                <select class="input-modern" x-model="filtroCalifGrado"
                  @change="$nextTick(() => { filtroCalifGrupo=''; buscarAlumnoCalif(); })"
                  :disabled="!filtroCalifNivel">
                  <option value="">Grado</option>
                  <template x-for="g in ['1','2','3','4','5','6']" :key="g">
                    <option :value="g" x-text="g + '°'"></option>
                  </template>
                </select>
              </div>
              <div>
                <label class="text-xs font-medium text-gray-600">Grupo</label>
                <select class="input-modern" x-model="filtroCalifGrupo" @change="$nextTick(() => buscarAlumnoCalif())"
                  :disabled="!filtroCalifGrado">
                  <option value="">Grupo</option>
                  <template x-for="s in ['A','B','C','D','E','F']" :key="s">
                    <option :value="s" x-text="s"></option>
                  </template>
                </select>
              </div>
            </div>
            <div class="card-clean p-5" x-show="alumnoSeleccionadoCalif">
              <div class="flex justify-between items-end mb-4">
                <div>
                  <div class="font-bold text-lg text-navy-700" x-text="alumnoActualCalif?.nombre"></div>
                  <div class="flex items-center gap-3 mt-1">
                    <div class="text-sm text-gray-500" x-text="(typeof alumnoActualCalif?.grupo === 'object') ? `${alumnoActualCalif?.grupo?.grado || ''}° ${alumnoActualCalif?.grupo?.seccion || ''}`.trim() : alumnoActualCalif?.grupo"></div>
                    <button class="btn-outline px-3 py-1 text-xs flex items-center" x-show="!esMaestra()" @click="view = 'alumnos'; tabDirectorio = 'alumnos'; tabAlumnoFicha = 'academicos'; $nextTick(() => seleccionarAlumnoFicha(alumnoActualCalif))">
                      <i data-lucide="user" class="w-3 h-3 mr-1"></i> Ver expediente
                    </button>
                  </div>
                </div>
                <div class="text-right">
                  <span class="px-3 py-1 bg-navy-50 text-navy-700 rounded-full text-sm font-semibold"
                    x-text="alumnoActualCalif?.matricula"></span>
                </div>
              </div>

              <div class="flex gap-4 mb-5 border-b border-gray-200">
                <button class="pb-2 font-medium text-sm"
                  :class="tipoEvaluacionCalif==='curricular' ? 'text-navy-700 border-b-2 border-navy-700' : 'text-gray-400 hover:text-gray-600'"
                  @click="tipoEvaluacionCalif='curricular'">Curriculares</button>
                <button class="pb-2 font-medium text-sm"
                  :class="tipoEvaluacionCalif==='extracurricular' ? 'text-navy-700 border-b-2 border-navy-700' : 'text-gray-400 hover:text-gray-600'"
                  @click="tipoEvaluacionCalif='extracurricular'">Extracurriculares (Clubes)</button>
                <button class="pb-2 font-medium text-sm"
                  :class="tipoEvaluacionCalif==='taller' ? 'text-navy-700 border-b-2 border-navy-700' : 'text-gray-400 hover:text-gray-600'"
                  @click="tipoEvaluacionCalif='taller'">Taller</button>
              </div>

              <template x-if="tipoEvaluacionCalif==='curricular'">
                <div>
                  <div class="text-right mb-4">
                    <div class="text-xs text-gray-500">Promedio General</div>
                    <div class="text-xl font-bold text-navy-800" x-text="promedioGeneralCalif"></div>
                  </div>
                  <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left">
                      <thead class="bg-gray-50 text-gray-600">
                        <tr>
                          <th class="p-3 font-semibold rounded-tl-lg">Materia</th>
                          <th class="p-3 font-semibold text-center w-32">Trimestre 1</th>
                          <th class="p-3 font-semibold text-center w-32">Trimestre 2</th>
                          <th class="p-3 font-semibold text-center w-32">Trimestre 3</th>
                          <th class="p-3 font-semibold text-center w-24 rounded-tr-lg">Promedio</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-for="mat in materiasAlumno" :key="mat.id">
                          <tr class="border-b">
                            <td class="p-3 font-medium text-gray-800" x-text="mat.nombre"></td>
                            <td class="p-2">
                              <template x-if="esPreescolar"><textarea
                                  class="w-full input-modern text-xs p-1 h-10 resize-none" x-model="mat.T1.t"
                                  placeholder="Obs..."></textarea></template>
                              <template x-if="!esPreescolar"><input type="number"
                                  class="w-full input-modern text-center" min="0" max="10" step="0.1" x-model="mat.T1.v"
                                  @input="recalcularPromediosCalif()"></template>
                            </td>
                            <td class="p-2">
                              <template x-if="esPreescolar"><textarea
                                  class="w-full input-modern text-xs p-1 h-10 resize-none" x-model="mat.T2.t"
                                  placeholder="Obs..."></textarea></template>
                              <template x-if="!esPreescolar"><input type="number"
                                  class="w-full input-modern text-center" min="0" max="10" step="0.1" x-model="mat.T2.v"
                                  @input="recalcularPromediosCalif()"></template>
                            </td>
                            <td class="p-2">
                              <template x-if="esPreescolar"><textarea
                                  class="w-full input-modern text-xs p-1 h-10 resize-none" x-model="mat.T3.t"
                                  placeholder="Obs..."></textarea></template>
                              <template x-if="!esPreescolar"><input type="number"
                                  class="w-full input-modern text-center" min="0" max="10" step="0.1" x-model="mat.T3.v"
                                  @input="recalcularPromediosCalif()"></template>
                            </td>
                            <td class="p-3 text-center font-bold"
                              :class="mat.prom < 6 ? 'text-red-500' : 'text-emerald-600'" x-text="mat.prom"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                  <div class="flex justify-end gap-3 mt-5">
                    <button class="btn-outline" @click="alumnoSeleccionadoCalif=false">Cancelar</button>
                    <button class="btn-primary" @click="guardarCalificacion()">Guardar Calificaciones</button>
                  </div>
                </div>
              </template>

              <template x-if="tipoEvaluacionCalif==='extracurricular'">
                <div>
                  <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left">
                      <thead class="bg-gray-50 text-gray-600">
                        <tr>
                          <th class="p-3 font-semibold rounded-tl-lg">Club Extracurricular</th>
                          <th class="p-3 font-semibold text-center w-32">Trimestre 1</th>
                          <th class="p-3 font-semibold text-center w-32">Trimestre 2</th>
                          <th class="p-3 font-semibold text-center w-32">Trimestre 3</th>
                          <th class="p-3 font-semibold text-center w-24 rounded-tr-lg">Promedio</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-for="club in clubesAlumno" :key="club.id">
                          <tr class="border-b">
                            <td class="p-3 font-medium text-gray-800 uppercase" x-text="club.nombre"></td>
                            <td class="p-2"><input type="number" class="w-full input-modern text-center" min="0"
                                max="10" step="0.1" x-model="club.T1.v" @input="recalcularPromediosExtra()"></td>
                            <td class="p-2"><input type="number" class="w-full input-modern text-center" min="0"
                                max="10" step="0.1" x-model="club.T2.v" @input="recalcularPromediosExtra()"></td>
                            <td class="p-2"><input type="number" class="w-full input-modern text-center" min="0"
                                max="10" step="0.1" x-model="club.T3.v" @input="recalcularPromediosExtra()"></td>
                            <td class="p-3 text-center font-bold"
                              :class="club.prom < 6 ? 'text-red-500' : 'text-emerald-600'" x-text="club.prom"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                  <div class="flex justify-end gap-3 mt-5">
                    <button class="btn-outline" @click="alumnoSeleccionadoCalif=false">Cancelar</button>
                    <button class="btn-primary" @click="guardarCalificacionExtraLote()">Guardar Clubes</button>
                  </div>
                </div>
              </template>

              <!-- TABLA DE TALLER -->
              <template x-if="tipoEvaluacionCalif==='taller'">
                <div>
                  <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left">
                      <thead class="bg-gray-50 text-gray-600">
                        <tr>
                          <th class="p-3 font-semibold rounded-tl-lg">Materia Taller</th>
                          <th class="p-3 font-semibold text-center w-32">Trimestre 1</th>
                          <th class="p-3 font-semibold text-center w-32">Trimestre 2</th>
                          <th class="p-3 font-semibold text-center w-32">Trimestre 3</th>
                          <th class="p-3 font-semibold text-center w-24 rounded-tr-lg">Evaluación</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr class="border-b">
                          <td class="p-3 font-medium text-gray-800 uppercase" x-text="tallerAlumno.nombre"></td>
                          <td class="p-2">
                            <select class="w-full input-modern text-center" x-model="tallerAlumno.T1.v">
                              <option value=""></option>
                              <option value="A">A</option>
                              <option value="NA">NA</option>
                            </select>
                          </td>
                          <td class="p-2">
                            <select class="w-full input-modern text-center" x-model="tallerAlumno.T2.v">
                              <option value=""></option>
                              <option value="A">A</option>
                              <option value="NA">NA</option>
                            </select>
                          </td>
                          <td class="p-2">
                            <select class="w-full input-modern text-center" x-model="tallerAlumno.T3.v">
                              <option value=""></option>
                              <option value="A">A</option>
                              <option value="NA">NA</option>
                            </select>
                          </td>
                          <td class="p-3 text-center font-bold"
                            :class="calcularEvaluacionTaller() === 'NA' ? 'text-red-500' : (calcularEvaluacionTaller() === 'A' ? 'text-emerald-600' : 'text-gray-400')"
                            x-text="calcularEvaluacionTaller()"></td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                  <div class="flex justify-end gap-3 mt-5">
                    <button class="btn-outline" @click="alumnoSeleccionadoCalif=false">Cancelar</button>
                    <button class="btn-primary" @click="guardarCalificacionTallerLote()">Guardar Taller</button>
                  </div>
                </div>
              </template>

            </div>
            <div class="text-gray-400 text-sm text-center py-6"
              x-show="!alumnoSeleccionadoCalif && alumnosCoincidencias.length===0">No se encontraron alumnos</div>
            <div class="grid gap-2 mt-3" x-show="!alumnoSeleccionadoCalif && alumnosCoincidencias.length > 0"><template
                x-for="al in alumnosCoincidencias">
                <div class="card-clean p-3 flex justify-between items-center cursor-pointer hover:bg-navy-50 transition"
                  @click="seleccionarAlumnoCalif(al)">
                  <div><span class="font-medium text-navy-700" x-text="al.nombre"></span>
                    <div class="text-xs text-gray-400"><span x-text="al.matricula"></span><span x-show="al.nivel"
                        class="ml-2 px-2 py-0.5 bg-gray-100 rounded text-gray-600 font-medium"><span
                          x-text="al.nivel"></span><span x-show="al.grado"
                          x-text="' - ' + al.grado + '° ' + (al.seccion || '')"></span></span></div>
                  </div><button class="btn-primary text-xs">Seleccionar</button>
                </div>
              </template></div>
          </div>
</div>
