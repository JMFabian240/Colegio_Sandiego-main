<div class="w-full h-full" x-data>
<div>
            <div class="flex justify-between mb-4">
              <h2 class="text-xl font-bold text-navy-800">Registro de pagos</h2><button class="btn-primary"
                @click="abrirModalPago()">+ Nuevo pago</button>
            </div>
            <div class="card-clean p-5">
              <table class="w-full text-sm">
                <thead class="bg-gray-50">
                  <tr>
                    <th class="p-2 text-left">Alumno</th>
                    <th class="p-2 text-left">Concepto</th>
                    <th class="p-2 text-left">Fecha</th>
                    <th class="p-2 text-right">Monto</th>
                  </tr>
                </thead>
                <tbody><template x-for="p in pagosRegistrados">
                    <tr class="border-b">
                      <td class="p-2" x-text="p.alumno"></td>
                      <td class="p-2" x-text="p.concepto"></td>
                      <td class="p-2" x-text="p.fecha"></td>
                      <td class="p-2 text-right font-mono" :class="p.recargo ? 'text-crimson-600 font-bold' : ''"
                        x-text="'$'+p.monto"></td>
                    </tr>
                  </template></tbody>
              </table>
              <div class="flex items-center justify-between pt-3 mt-2 border-t" x-show="paginasPagos > 1"><span
                  class="text-xs text-gray-500"
                  x-text="`Página ${paginaPagos} de ${paginasPagos} · ${totalPagos} pagos`"></span>
                <div class="flex gap-2"><button class="btn-outline text-xs py-1 px-3" :disabled="paginaPagos<=1"
                    @click="_irPaginaPagos(paginaPagos-1)">← Anterior</button><button
                    class="btn-outline text-xs py-1 px-3" :disabled="paginaPagos>=paginasPagos"
                    @click="_irPaginaPagos(paginaPagos+1)">Siguiente →</button></div>
              </div>
            </div>
          </div>
</div>
